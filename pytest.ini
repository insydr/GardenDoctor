[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require app launch)
    slow: Slow-running tests
    skip_ci: Skip in CI environment
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
