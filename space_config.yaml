# Hugging Face Spaces Configuration
# Garden Doctor: Plant Disease & Care Assistant
# PRD Section 11: Deployment Configuration

# =============================================================================
# Space Metadata
# =============================================================================
title: "Garden Doctor AI"
emoji: "🌿"
colorFrom: "green"
colorTo: "emerald"
sdk: "gradio"
sdk_version: "4.44.0"
python_version: "3.10"

# =============================================================================
# Hardware Configuration
# =============================================================================
# For free CPU tier (default)
hardware: "cpu-basic"

# For GPU tier (uncomment to use)
# hardware: "t4-medium"

# =============================================================================
# Resource Limits
# =============================================================================
# Memory limit for free tier
memory: 16  # GB

# Timeout for long-running operations
timeout: 300  # seconds

# =============================================================================
# Environment Variables
# =============================================================================
env_variables:
  # Mock mode - set to "false" when ready for production
  GARDEN_DOCTOR_MOCK: "false"
  
  # Inference timeout (PRD Section 11: 45 seconds)
  GARDEN_DOCTOR_TIMEOUT: "45"
  
  # 4-bit quantization: "auto", "true", or "false"
  # auto: use 4-bit on GPU, standard on CPU
  GARDEN_DOCTOR_4BIT: "auto"
  
  # CPU offload for large models
  GARDEN_DOCTOR_CPU_OFFLOAD: "true"
  
  # Health check endpoint
  HEALTH_CHECK_ENABLED: "true"

# =============================================================================
# Persistent Storage
# =============================================================================
# Enable for caching model weights (recommended)
persistent_storage: true

# =============================================================================
# Tags for Discovery
# =============================================================================
tags:
  - "plant-disease"
  - "agriculture"
  - "computer-vision"
  - "llava"
  - "vision-language-model"
  - "plant-health"
  - "garden"

# =============================================================================
# Model Card / Description
# =============================================================================
short_description: |
  AI-powered plant disease detection and care recommendations. 
  Upload a leaf photo for instant diagnosis and treatment guidance.

# =============================================================================
# Health Check Configuration
# =============================================================================
health_check:
  enabled: true
  endpoint: "/health"
  interval_seconds: 30
  timeout_seconds: 10

# =============================================================================
# Startup Configuration
# =============================================================================
# Pre-warm the model on startup
preload_model: true

# Maximum concurrent requests
max_concurrent_requests: 5

# Queue configuration
queue:
  max_size: 20
  concurrency_count: 3
