# GitHub Actions Workflow: Run Tests
# Runs pytest on push and pull requests

name: Run Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  GARDEN_DOCTOR_MOCK: true
  GARDEN_DOCTOR_TIMEOUT: 10

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          pip install gradio==4.44.0
          pip install Pillow==10.4.0
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.44.2
          pip install fpdf2==2.7.9
      
      - name: Run Unit Tests
        run: |
          pytest tests/ -v --tb=short -m "not slow" --cov=app --cov-report=xml --cov-report=term-missing
        continue-on-error: true
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
      
      - name: Create Test Summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tests completed. Check the job output for details." >> $GITHUB_STEP_SUMMARY
